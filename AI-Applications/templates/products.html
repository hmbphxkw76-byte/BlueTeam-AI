<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>产品目录 · {{ lab_name }}</title>
  <link rel="stylesheet" href="/static/lab.css">
  <style>
    .product-grid { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); margin-top: 1.5rem; }
    .product-card { border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: transform .2s, box-shadow .2s; }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .product-card h3 { margin: 0 0 .5rem; font-size: 1.1rem; }
    .product-card .cat-tag { display: inline-block; background: var(--accent-soft); color: var(--accent); padding: 2px 10px; border-radius: 12px; font-size: .78rem; margin-bottom: .5rem; }
    .product-card .price { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin: .5rem 0; }
    .product-card .desc { color: var(--muted); font-size: .88rem; line-height: 1.5; margin-bottom: .75rem; }
    .product-card .features, .product-card .specs { font-size: .8rem; color: var(--muted); margin-top: .5rem; }
    .product-card .warranty { display: inline-block; background: var(--success-soft); color: var(--success); padding: 2px 8px; border-radius: 6px; font-size: .72rem; margin-top: .5rem; }
    .category-filters { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
    .cat-btn { padding: 4px 14px; border: 1px solid var(--border); border-radius: 16px; cursor: pointer; font-size: .84rem; background: transparent; color: var(--text); transition: all .2s; }
    .cat-btn:hover, .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
  {% include "_nav.html" %}

  <main class="container">
    <section class="mt-2 mb-3">
      <span class="eyebrow">Product Catalog</span>
      <h1>产品目录</h1>
      <p class="text-muted text-sm">浏览和了解我们的高品质线缆、充电及音频配件。</p>
      <div class="category-filters">
        <button class="cat-btn active" data-cat="">全部</button>
        <button class="cat-btn" data-cat="USB-C 线缆">USB-C 线缆</button>
        <button class="cat-btn" data-cat="HDMI 线缆">HDMI 线缆</button>
        <button class="cat-btn" data-cat="Lightning 线缆">Lightning 线缆</button>
        <button class="cat-btn" data-cat="充电配件">充电配件</button>
        <button class="cat-btn" data-cat="集线器">集线器</button>
        <button class="cat-btn" data-cat="音频设备">音频设备</button>
        <button class="cat-btn" data-cat="适配器">适配器</button>
      </div>
    </section>

    <div class="product-grid" id="product-grid">
      <p class="text-muted">加载中...</p>
    </div>
  </main>

  <script>
    let allProducts = [];

    async function loadProducts(category = '') {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '<p class="text-muted">加载中...</p>';
      try {
        const url = category ? `/api/v1/products?category=${encodeURIComponent(category)}` : '/api/v1/products';
        const r = await fetch(url);
        if (!r.ok) throw new Error('加载失败');
        const data = await r.json();
        allProducts = data.products || [];
        renderProducts(allProducts);
      } catch (e) {
        grid.innerHTML = '<p class="text-muted" style="color:var(--danger)">加载产品失败</p>';
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById('product-grid');
      if (!products.length) {
        grid.innerHTML = '<p class="text-muted">暂无产品</p>';
        return;
      }
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <span class="cat-tag">${p.category || ''}</span>
          <h3>${p.name}</h3>
          <p class="desc">${p.description || ''}</p>
          <div class="price">¥${p.price?.toFixed(2) || '0.00'}</div>
          ${p.features ? `<div class="features"><strong>特点：</strong>${p.features.replace(/;/g, ' | ')}</div>` : ''}
          ${p.specifications ? `<div class="specs"><strong>规格：</strong>${p.specifications}</div>` : ''}
          ${p.warranty_months ? `<span class="warranty">${p.warranty_months}个月保修</span>` : ''}
        </div>
      `).join('');
    }

    // 分类切换
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        loadProducts(this.dataset.cat);
      });
    });

    loadProducts();
  </script>
</body>
</html>
